name: CGV 용산 IMAX 알리미

on:
  schedule:
    # 매 10분마다 실행 (KST 기준 07:00 ~ 02:00 사이만)
    # GitHub Actions cron은 UTC 기준. KST = UTC+9
    # UTC 22:00 ~ 17:00 = KST 07:00 ~ 02:00
    - cron: '*/10 22-23 * * *' # KST 07:00~09:00
    - cron: '*/10 0-17 * * *' # KST 09:00~02:00

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      target_date:
        description: '특정 날짜만 체크 (YYYYMMDD, 비우면 14일 체크)'
        required: false
        default: ''

concurrency:
  group: imax-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # state.json 커밋용

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run IMAX checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE: ${{ inputs.target_date }}
        run: pnpm start

      - name: Commit state.json
        run: |
          git config user.name  "imax-bot"
          git config user.email "imax-bot@users.noreply.github.com"
          git add state.json
          # 변경이 없으면 커밋 스킵
          TIMESTAMP=$(TZ=Asia/Seoul date +"%Y-%m-%d %H:%M KST")
          git diff --cached --quiet || git commit -m "chore: [$TIMESTAMP] IMAX 상태 업데이트 [skip ci]"
          git push
